spring:
  datasource:
    # url: jdbc:tc:postgresql:15-alpine:///finventory_test
    # driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    url: jdbc:h2:mem:finventory_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: sa
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
logging:
  level:
    org.springframework.security: DEBUG
